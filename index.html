<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VOYO" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />

    <!-- SEO -->
    <title>VOYO Music - African Music Discovery | OYE</title>
    <meta name="description" content="VOYO Music — AI-powered streaming with VOYEX spatial audio. Afrobeats, Amapiano, Highlife, Mbalax and more." />
    <meta name="keywords" content="African music, Afrobeats, Amapiano, Highlife, Mbalax, music discovery, African artists, Burna Boy, Wizkid, music streaming, VOYO" />
    <meta name="author" content="DASH" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="canonical" href="https://voyomusic.com/" />

    <!-- Multilingual -->
    <link rel="alternate" hreflang="en" href="https://voyomusic.com/" />
    <link rel="alternate" hreflang="fr" href="https://voyomusic.com/" />
    <link rel="alternate" hreflang="x-default" href="https://voyomusic.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VOYO Music" />
    <meta property="og:title" content="VOYO Music" />
    <meta property="og:description" content="Music that feels you — AI-powered streaming with VOYEX spatial audio" />
    <meta property="og:url" content="https://voyomusic.com/" />
    <meta property="og:image" content="https://voyomusic.com/icon-512.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VOYO Music" />
    <meta name="twitter:description" content="Music that feels you — AI-powered streaming with VOYEX spatial audio" />
    <meta name="twitter:image" content="https://voyomusic.com/icon-512.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "VOYO Music",
      "url": "https://voyomusic.com",
      "description": "Music that feels you — AI-powered streaming with VOYEX spatial audio. Afrobeats, Amapiano, Highlife, Mbalax and more.",
      "applicationCategory": "MusicApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "creator": { "@type": "Organization", "name": "DASH", "url": "https://dasuperhub.com" }
    }
    </script>

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="CCp28UNriuu0Nj1diYszuK8pNtbfGXsl-ojn4rl_vm4" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <!-- Warm-start TCP/TLS to the hosts the very first mount will hit:
         Supabase REST (pools + tracks), R2 edge worker (audio HEAD +
         thumbnail probe), YouTube thumbnail CDN. Saves ~100-300ms per
         host vs. opening each connection on the first fetch. -->
    <link rel="preconnect" href="https://anmgyxhnyhbyxzpjhxgx.supabase.co" crossorigin>
    <link rel="preconnect" href="https://voyo-edge.dash-webtv.workers.dev" crossorigin>
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <!-- Satoshi (primary — Wakanda-tier geometric sans) + Space Grotesk (display) + Italianno (luxury script). -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Italianno&display=swap" rel="stylesheet">
  </head>
  <body class="h-full bg-[#050508]">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
